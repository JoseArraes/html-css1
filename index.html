<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curso HTML e CSS</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            background: #f4f4f4;
            color: #333;
        }

        header{
            background: #0d6efd;
            color: white;
            text-align: center;
            padding: 40px 20px;
        }

        header h1{
            margin-bottom: 10px;
        }

        main{
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .container{
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .card{
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,.1);
            text-align: center;
        }

        .card h2{
            margin-bottom: 15px;
        }

        .card a{
            display: inline-block;
            text-decoration: none;
            background: #0d6efd;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            transition: .3s;
        }

        .card a:hover{
            background: #0b5ed7;
        }

        footer{
            text-align: center;
            padding: 20px;
            margin-top: 40px;
            color: #666;
        }
    </style>
</head>
<body>

<header>
    <h1>Curso HTML5 e CSS3</h1>
    <p>Repositório de estudos e projetos</p>
</header>

<main>
    <div class="container">

        <div class="card">
            <h2>📚 Exercícios</h2>
            <p>Acesse todos os exercícios realizados durante o curso.</p>
            <br>
            <a href="EXERCICIOS/">Abrir Exercícios</a>
        </div>

        <div class="card">
            <h2>🚀 Desafios</h2>
            <p>Veja os desafios desenvolvidos durante os estudos.</p>
            <br>
            <a href="DESAFIOS/">Abrir Desafios</a>
        </div>

    </div>
</main>

<footer>
    <p>Desenvolvido por José Arraes</p>
</footer>

</body>
</html>
